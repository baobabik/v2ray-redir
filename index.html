<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перенаправление...</title>
    <style>
        body { 
            background: #1a1a1a; color: #fff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: -apple-system, sans-serif;
            text-align: center; padding: 20px;
        }
        .loader { 
            border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #248bcf; 
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; 
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .hint-container { display: none; flex-direction: column; align-items: center; }
        
        .manual-link { 
            display: inline-block; margin-top: 15px; padding: 15px 25px; 
            background: #248bcf; color: white; text-decoration: none; 
            border-radius: 12px; font-size: 20px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .text-desc { font-size: 18px; color: #ccc; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="loading" class="loader"></div>
    
    <div id="hint" class="hint-container">
        <div class="text-desc">Приложение не открылось?</div>
        <a id="btn" href="#" class="manual-link">ОТКРЫТЬ ПРИЛОЖЕНИЕ</a>
        <p style="color: #666; font-size: 14px; margin-top: 20px;">Нажмите кнопку выше для ручного запуска</p>
    </div>

    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const config = urlParams.get('config');

    if (config) {
        const isDesktop = !/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const button = document.getElementById('btn'); // Исправлено: берем правильный ID

        // Формируем нужную ссылку
        const appLink = isDesktop ? "hiddify://import/" + config : "v2raytun://import/" + config;
        
        // Сразу привязываем ссылку к кнопке
        button.href = appLink;

        // ФУНКЦИЯ ЗАПУСКА
        const launchApp = () => {
            window.location.href = appLink;
            // Фоллбэк через 500мс
            setTimeout(() => { window.location.href = config; }, 500);
        };

        // 1. Пытаемся запустить АВТОМАТИЧЕСКИ при загрузке
        launchApp();

        // 2. Если пользователь нажмет кнопку вручную
        button.onclick = (e) => {
            launchApp();
        };

        // 3. Показываем кнопку-подсказку через 2.5 секунды, если авто-запуск не сработал
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('hint').style.display = 'flex';
        }, 2500);

    } else {
        document.body.innerHTML = "Ошибка: Конфиг не найден в ссылке.";
    }
    </script>
</body>
</html>
