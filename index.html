<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { background: #1a1a1a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .btn { background: #248bcf; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <button class="btn" id="go">ПОДКЛЮЧИТЬ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        document.getElementById('go').onclick = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const config = urlParams.get('config');
            
            if (config) {
                // Пытаемся открыть через специальный протокол v2raytun
                const fullLink = "v2raytun://import/" + config;

                // Способ 1: Метод Telegram (самый приоритетный)
                tg.openLink(fullLink);

                // Способ 2: Прямой переход через location
                window.location.href = fullLink;

                // Способ 3: Создание невидимой ссылки
                const a = document.createElement('a');
                a.href = fullLink;
                document.body.appendChild(a);
                a.click();

                // Закрываем Mini App через 2 секунды
                setTimeout(() => { tg.close(); }, 2000);
            }
        };
    </script>
</body>
</html>
