<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #248bcf; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const config = urlParams.get('config');

        if (config) {
            // Используем официальный метод Telegram для открытия ссылок
            // Он вызывает системное диалоговое окно "Открыть в приложении?"
            tg.openLink(config);

            // Закрываем Mini App сразу после вызова диалога
            setTimeout(() => {
                tg.close();
            }, 500);
        } else {
            tg.close();
        }
    </script>
</body>
</html>
