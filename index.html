<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import</title>
    <script src="https://telegram.org"></script>
    <style>
        body { 
            background: #1a1a1a; color: white; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: -apple-system, blinkmacsystemfont, "segoe ui", roboto, helvetica, arial, sans-serif;
        }
        .btn {
            background: #248bcf; color: white; border: none; padding: 15px 30px;
            border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn:active { transform: scale(0.98); background: #1c77b0; }
        p { margin-bottom: 20px; color: #aaa; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>
    <p id="info">Конфигурация готова к импорту</p>
    <button class="btn" id="importBtn">ИМПОРТИРОВАТЬ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const config = urlParams.get('config');

        const btn = document.getElementById('importBtn');
        const info = document.getElementById('info');

        if (config) {
            btn.onclick = () => {
                // Прямой вызов протокола по клику
                window.location.href = config;
                
                // Даем время на срабатывание и закрываем
                setTimeout(() => { tg.close(); }, 2000);
            };
        } else {
            btn.style.display = 'none';
            info.innerText = "Ошибка: Ссылка не найдена";
        }
    </script>
</body>
</html>
