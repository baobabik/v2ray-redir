<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <style>
        body { background: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #248bcf; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        // Получаем конфиг из URL (?config=vless://...)
        const urlParams = new URLSearchParams(window.location.search);
        const config = urlParams.get('config');

        if (config) {
            // Формируем прямую ссылку для v2raytun
            const appLink = "v2raytun://import/" + config;
            
            // Пытаемся открыть приложение
            window.location.href = appLink;

            // Запасной вариант через 500мс (если первый заблокирован)
            setTimeout(() => {
                window.location.href = config;
            }, 500);

            // Если через 5 секунд пользователь все еще тут — выводим подсказку
            setTimeout(() => {
                document.body.innerHTML = '<div style="text-align:center">Если приложение не открылось, <a href="' + appLink + '" style="color:#248bcf">нажмите сюда</a></div>';
            }, 5000);
        }
    </script>
</body>
</html>
