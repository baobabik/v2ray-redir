<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Import Config</title>
    <script src="https://telegram.org"></script>
    <style>
        body { 
            background-color: var(--tg-theme-bg-color, #1a1a1a); 
            color: var(--tg-theme-text-color, #ffffff);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; font-family: sans-serif;
        }
        .container { text-align: center; padding: 20px; }
        .icon { font-size: 64px; margin-bottom: 20px; }
        .btn {
            background-color: var(--tg-theme-button-color, #248bcf);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; padding: 16px 32px; border-radius: 12px;
            font-size: 18px; font-weight: 600; cursor: pointer; width: 100%; max-width: 280px;
        }
        .btn:active { opacity: 0.8; }
        p { opacity: 0.7; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚀</div>
        <button id="mainBtn" class="btn">ПОДКЛЮЧИТЬ</button>
        <p>Нажмите для импорта в v2raytun</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const config = urlParams.get('config');

        document.getElementById('mainBtn').onclick = function() {
            if (config) {
                // Прямой вызов через метод Telegram (самый надежный)
                tg.openLink(config);
                
                // Закрываем окно через секунду
                setTimeout(() => { tg.close(); }, 1000);
            }
        };
    </script>
</body>
</html>
